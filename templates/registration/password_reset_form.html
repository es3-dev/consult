{% extends "auth/base_auth.html" %}
{% block content %}
<h2 class="text-lg font-semibold">Recuperar contrasena</h2>
<p class="mt-1 text-sm text-slate-500">Te enviaremos instrucciones al correo registrado.</p>
<form method="post" class="mt-6 space-y-4">{% csrf_token %}{{ form.as_p }}<button class="w-full rounded-lg bg-slate-950 px-4 py-2.5 text-sm font-semibold text-white">Enviar</button></form>
{% endblock %}
